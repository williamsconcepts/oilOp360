<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OilOps360 | Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel" aria-labelledby="login-title">
      <div class="brand-lockup">
        <span class="brand-mark">O</span>
        <div>
          <h1 id="login-title">OilOps360</h1>
          <p>Contractor compliance and asset inspection workspace</p>
        </div>
      </div>

      <form class="login-form" id="loginForm">
        <label>
          Email
          <input type="email" id="email" value="admin@oilops360.com" autocomplete="email" required>
        </label>
        <label>
          Password
          <input type="password" id="password" value="oilops360" autocomplete="current-password" required>
        </label>
        <label>
          Role
          <select id="role">
            <option value="Compliance Manager">Compliance Manager</option>
            <option value="Inspector">Inspector</option>
            <option value="Viewer">Viewer</option>
          </select>
        </label>
        <button type="submit" class="primary-action">Sign in</button>
      </form>
    </section>

    <section class="login-art" aria-label="Operations summary">
      <div class="metric-strip">
        <article>
          <span>93%</span>
          Contractor compliance
        </article>
        <article>
          <span>18</span>
          inspections due
        </article>
        <article>
          <span>7</span>
          documents pending
        </article>
      </div>
    </section>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function (event) {
      event.preventDefault();
      const role = document.getElementById('role').value;
      localStorage.setItem('oilops360User', JSON.stringify({
        name: document.getElementById('email').value.split('@')[0],
        email: document.getElementById('email').value,
        role
      }));
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
